

name: nightly

on:
  schedule:
    - cron: '0 2 * * *'

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - run: GOPATH=$(go env GOPATH) make test

      - run: GOPATH=$(go env GOPATH) LAKEKEEPER_VERSION=latest-main make test-integration
        timeout-minutes: 10

      - run: GOPATH=$(go env GOPATH) LAKEKEEPER_VERSION=latest-main make test-e2e-compose
        timeout-minutes: 15

      - name: setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: setup helm
        uses: azure/setup-helm@v4

      - run: GOPATH=$(go env GOPATH) make test-e2e-kind
        timeout-minutes: 20
