packageName: managementv1
packageVersion: 1.0.0

# Embed the generated code inside the existing module instead of producing a
# standalone Go SDK. Skips go.mod/go.sum/README emission and uses package-local
# imports.
withGoMod: false
isGoSubmodule: true

# Polymorphism / oneOf handling. Lakekeeper's storage profile and credential
# types are oneOf unions; the discriminator lookup makes them ergonomic.
useOneOfDiscriminatorLookup: true

# Disambiguate enum values across enum types so we don't get name collisions
# between, e.g., warehouse status and project status enums.
enumClassPrefix: true

# Keep the file footprint small — we expose the generated client through the
# pkg/client facade, so the additional XxxAPIService interface variants are not
# needed.
generateInterfaces: false

# Hidden files openapi-generator drops next to the output. Committed so that
# regeneration produces a stable diff.
gitUserId: lakekeeper
gitRepoId: go-lakekeeper
